<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数独游戏</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-th"></i> 欢迎来到数独世界</h1>
        </header>

        <main>
            <div class="game-container">
                <div class="game-header">
                    <div class="game-info">
                        <div class="timer">
                            <i class="fas fa-clock"></i>
                            <span id="timer">00:00</span>
                        </div>
                        <div class="difficulty">
                            <i class="fas fa-chart-line"></i>
                            <span id="current-difficulty">简单</span>
                        </div>
                        <div class="mistakes">
                            <i class="fas fa-times-circle"></i>
                            <span id="mistakes-count">0/3</span>
                        </div>
                    </div>
                    
                    <div class="game-controls">
                        <button id="new-game" class="btn btn-primary">
                            <i class="fas fa-plus-circle"></i> 新游戏
                        </button>
                        <button id="check-game" class="btn btn-secondary">
                            <i class="fas fa-check-circle"></i> 检查
                        </button>
                        <button id="solve-game" class="btn btn-secondary">
                            <i class="fas fa-lightbulb"></i> 提示
                        </button>
                        <button id="reset-game" class="btn btn-danger">
                            <i class="fas fa-redo"></i> 重置
                        </button>
                    </div>
                </div>

                <div class="difficulty-selector">
                    <h3>选择难度:</h3>
                    <div class="difficulty-buttons">
                        <button class="difficulty-btn active" data-difficulty="easy">简单</button>
                        <button class="difficulty-btn" data-difficulty="medium">中等</button>
                        <button class="difficulty-btn" data-difficulty="hard">困难</button>
                    </div>
                </div>

                <div class="sudoku-container">
                    <div class="sudoku-grid" id="sudoku-grid">
                        <!-- 数独网格将通过JavaScript动态生成 -->
                    </div>
                    
                    <div class="number-pad">
                        <div class="mode-toggle">
                            <button id="note-mode-btn" class="mode-btn">
                                <i class="fas fa-pencil-alt"></i> 笔记模式
                            </button>
                        </div>
                        <div class="number-buttons">
                            <button class="number-btn" data-number="1">1</button>
                            <button class="number-btn" data-number="2">2</button>
                            <button class="number-btn" data-number="3">3</button>
                            <button class="number-btn" data-number="4">4</button>
                            <button class="number-btn" data-number="5">5</button>
                            <button class="number-btn" data-number="6">6</button>
                            <button class="number-btn" data-number="7">7</button>
                            <button class="number-btn" data-number="8">8</button>
                            <button class="number-btn" data-number="9">9</button>
                            <button class="number-btn" id="erase-btn">
                                <i class="fas fa-eraser"></i>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <footer>
            <p>欢迎来到数独世界</p>
        </footer>
    </div>

    <div id="message-modal" class="modal">
        <div class="modal-content">
            <h2 id="message-title"></h2>
            <p id="message-text"></p>
            <button id="message-close" class="btn btn-primary">确定</button>
        </div>
    </div>

    <script src="sudoku.js"></script>
    <script src="script.js"></script>
</body>
</html>
